name: UI Tests

# Per the repo convention: workflow only checks out + invokes scripts. All
# logic lives in PowerShell so it can be reproduced locally with the same
# commands.

on:
  workflow_dispatch:
  push:
    branches:
      - try-appium

permissions:
  contents: read
  pages: write
  id-token: write

# A single concurrency group lets a newer commit cancel an in-flight Pages
# deployment from an older one.
concurrency:
  group: ui-tests-pages
  cancel-in-progress: false

jobs:
  ui-tests:
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      gallery-uploaded: ${{ steps.upload-pages.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium + WinAppDriver
        shell: pwsh
        run: ./UITests/ci-install.ps1

      - name: Build + run UI tests
        shell: pwsh
        run: ./UITests/run-ui-tests.ps1 -AutoVerify

      - name: Upload TestResults artifact (zip)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITests/TestResults/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Pages artifact (gallery for browsing)
        id: upload-pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: UITests/TestResults

  deploy-pages:
    needs: ui-tests
    if: always() && needs.ui-tests.outputs.gallery-uploaded == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
